# PipeWire Bluetooth MUST be enabled for alunotes-bridge.
# PipeWire handles A2DP codec negotiation/decode (SBC, AAC, LDAC, aptX,
# Samsung Scalable, etc.) and audio routing between Bluetooth devices.
# The Go daemon captures decoded PCM from PipeWire for WAV recording.
#
# This file is kept as documentation. Do NOT disable hardware.bluetooth.
