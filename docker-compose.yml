services:
  # ── Go Bluetooth bridge ──────────────────────────────────────
  # Runs on host network stack — D-Bus, PipeWire, Bluetooth all need host access.
  # Not reachable by name from Docker networks; use host.docker.internal instead.
  bridge:
    build:
      context: .
      dockerfile: Dockerfile.bridge
    image: alunotes/bridge
    restart: unless-stopped
    network_mode: host
    user: "${PUID}:${PGID}"
    volumes:
      - ./config.yaml:/etc/alunotes/config.yaml:ro
      - /var/run/dbus:/var/run/dbus
      # Session bus — the bridge exports MPRIS players for HFP call control
      # and AVRCP. Mounting the host socket avoids needing dbus-launch.
      - /run/user/1000/bus:/run/user/1000/bus
      # PipeWire sockets — pactl needs the pulse compatibility socket, the
      # audio pipeline needs the native pipewire one.
      - /run/user/1000/pipewire-0:/run/user/1000/pipewire-0
      - /run/user/1000/pulse:/run/user/1000/pulse
      - ./data/bridge:/var/lib/alunotes-bridge
      # Host-visible recordings dir — bridge writes here, web serves from it.
      - ./data/recordings:/data/recordings
    environment:
      - XDG_RUNTIME_DIR=/run/user/1000
      - DBUS_SESSION_BUS_ADDRESS=unix:path=/run/user/1000/bus

  # ── Python AI / ASR / diarization ────────────────────────────
  # Internal only — web container reaches it via http://ai:8100 on the internal net.
  ai:
    build:
      context: ./alunotes-ai
      # HF_TOKEN is only consumed by the discarded model-downloader stage
      # (see alunotes-ai/Dockerfile) and never lands in the runtime image.
      # Put HF_TOKEN=hf_... in the root .env alongside PUID/PGID.
      secrets:
        - hf_token
    image: alunotes/ai
    restart: unless-stopped
    networks:
      - internal
    volumes:
      - ./data/recordings:/data/recordings:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # ── Next.js web control plane ────────────────────────────────
  # Only service exposed to the host.
  web:
    build:
      context: ./alunotes-bt-web
    image: alunotes/web
    restart: unless-stopped
    networks:
      - internal
    ports:
      - "3000:3000"
    volumes:
      - web-db:/app/data
      # Read-only view of the host recordings dir so Next.js can serve WAVs.
      - ./data/recordings:/app/public/recordings:ro
    env_file:
      - ./.env
      - ./alunotes-bt-web/.env
    environment:
      - NODE_ENV=production
      - BRIDGE_API_URL=http://host.docker.internal:8090
      - AI_API_URL=http://ai:8100
      # Override the schema-relative default so the sqlite file lives in a
      # dir the nonroot container actually owns (see Dockerfile /app/data).
      - DATABASE_URL=file:/app/data/db.sqlite
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - ai

networks:
  internal:

volumes:
  web-db:

secrets:
  hf_token:
    environment: HF_TOKEN
